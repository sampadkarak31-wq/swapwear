<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SwapWear — Swap Style, Not Money</title>
<meta name="description" content="SwapWear is a clothing exchange marketplace. Trade what you no longer wear for something you'll love." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="toast-root" class="toast-root" aria-live="polite"></div>

  <header class="site-header" id="site-header">
    <div class="header-inner">
      <a href="#/" class="brand" data-link>
        <span class="brand-mark" aria-hidden="true">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <path d="M4 8 L14 3 L24 8 L24 12 L19 10 L19 25 L9 25 L9 10 L4 12 Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" fill="none"/>
          </svg>
        </span>
        <span class="brand-word">SwapWear</span>
      </a>

      <nav class="main-nav" id="main-nav">
        <a href="#/browse" data-link>Browse</a>
        <a href="#/how-it-works" data-link>How It Works</a>
        <a href="#/add-listing" data-link class="auth-only hidden">Sell / Swap</a>
      </nav>

      <div class="header-actions">
        <button class="icon-btn" id="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 3a9 9 0 1 0 9 9c0-.46-.03-.92-.1-1.36A5.4 5.4 0 0 1 12 3Z"/></svg>
        </button>
        <a href="#/wishlist" data-link class="icon-btn auth-only hidden" aria-label="Wishlist" title="Wishlist">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 21s-7.5-4.7-10-9.3C.4 8 2 4.5 5.6 4c2-.3 3.9.6 5 2.2a5.6 5.6 0 0 1 5-2.2c3.6.5 5.2 4 3.6 7.7C19.5 16.3 12 21 12 21Z"/></svg>
        </a>
        <a href="#/notifications" data-link class="icon-btn auth-only hidden" aria-label="Notifications" title="Notifications">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 8a6 6 0 1 1 12 0c0 4 1.5 5.5 1.5 5.5H4.5S6 12 6 8Z"/><path d="M10 18.5a2 2 0 0 0 4 0"/></svg>
          <span class="notif-dot hidden" id="notif-dot"></span>
        </a>
        <a href="#/dashboard" data-link class="icon-btn auth-only hidden" aria-label="Dashboard" title="Dashboard">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="3.4"/><path d="M4.5 20c1.3-3.8 4.4-6 7.5-6s6.2 2.2 7.5 6"/></svg>
        </a>
        <a href="#/login" data-link class="btn btn-ghost guest-only" id="nav-login">Log in</a>
        <a href="#/register" data-link class="btn btn-primary guest-only" id="nav-register">Join</a>
        <button class="btn btn-ghost auth-only hidden" id="nav-logout">Log out</button>
      </div>

      <button class="mobile-toggle" id="mobile-toggle" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <main id="app" role="main"></main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <span class="brand-word">SwapWear</span>
        <p>A closet is a story. Keep the story moving — swap instead of shopping.</p>
      </div>
      <div class="footer-cols">
        <div>
          <h4>Explore</h4>
          <a href="#/browse" data-link>Browse listings</a>
          <a href="#/how-it-works" data-link>How it works</a>
          <a href="#/add-listing" data-link>List an item</a>
        </div>
        <div>
          <h4>Account</h4>
          <a href="#/login" data-link>Log in</a>
          <a href="#/register" data-link>Create account</a>
          <a href="#/dashboard" data-link>Dashboard</a>
        </div>
        <div>
          <h4>Company</h4>
          <a href="#/how-it-works" data-link>About SwapWear</a>
          <a href="#/" data-link>Contact</a>
        </div>
      </div>
    </div>
    <div class="footer-bottom">© <span id="year"></span> SwapWear. Swap style, not money.</div>
  </footer>

  <template id="tpl-image-lightbox">
    <div class="lightbox" id="lightbox">
      <button class="lightbox-close" aria-label="Close">&times;</button>
      <img src="" alt="" />
    </div>
  </template>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/state.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/pages/landing.js"></script>
  <script src="/js/pages/auth.js"></script>
  <script src="/js/pages/browse.js"></script>
  <script src="/js/pages/listingDetail.js"></script>
  <script src="/js/pages/addListing.js"></script>
  <script src="/js/pages/dashboard.js"></script>
  <script src="/js/pages/chat.js"></script>
  <script src="/js/pages/profile.js"></script>
  <script src="/js/pages/admin.js"></script>
  <script src="/js/pages/misc.js"></script>
  <script src="/js/router.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
